[pytest]
DJANGO_SETTINGS_MODULE = backend.settings_test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    --cov=api
    --cov=users
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --strict-markers
    -v

# Markers for test categorization
markers =
    unit: Unit tests (no DB access)
    integration: Integration tests (DB access, external mocks)
    e2e: End-to-end tests (full workflow)
    slow: Slow tests (> 1 second)
    auth: Authentication related tests
    permission: Permission/authorization tests
    file: File operations tests
    external_api: External API integration tests
